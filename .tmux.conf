# tmux configuration
# Ctrl-Space prefix, vi keybindings, macOS clipboard integration

# ============================================================================
# PREFIX KEY
# ============================================================================
# Change prefix from Ctrl-b to Ctrl-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ============================================================================
# MOUSE & SCROLLBACK
# ============================================================================
# Enable mouse support
set -g mouse on

# Longer scrollback history
set -g history-limit 50000

# ============================================================================
# WINDOW & PANE NUMBERING
# ============================================================================
# Start window and pane numbering from 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# ============================================================================
# WINDOW BEHAVIOR
# ============================================================================
# Don't rename windows automatically
set -g allow-rename off

# ============================================================================
# COPY MODE & CLIPBOARD (VI KEYBINDINGS)
# ============================================================================
# Use vi keybindings in copy mode
setw -g mode-keys vi

# v to select, y to copy to pbcopy (macOS)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse drag copies to clipboard
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ============================================================================
# PANE SPLITTING
# ============================================================================
# Keep default bindings (% for vertical, " for horizontal)
# Add intuitive alternatives: | for vertical, - for horizontal
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Default split bindings also respect current path
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# ============================================================================
# PANE NAVIGATION
# ============================================================================
# Alt-hjkl for pane navigation without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ============================================================================
# STATUS BAR
# ============================================================================
# Functional, minimal status bar
set -g status-bg black
set -g status-fg white
set -g status-left " #{session_name} "
set -g status-right " %H:%M "
set -g status-justify left

# Highlight current window
setw -g window-status-current-style bg=blue,fg=white
setw -g window-status-style bg=black,fg=white
